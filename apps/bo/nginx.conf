# Nginx config for the bo SPA container (served on :80, behind the edge proxy).
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell (so new deploys are picked up immediately).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
